<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="tfr dfr" font-family="'IBM Plex Sans', system-ui, sans-serif">
  <title id="tfr">La plateforme en couches, vue comme une pyramide</title>
  <desc id="dfr">Une pyramide en quatre niveaux : une large base partagée, puis la marque, puis le marché, se réduisant à une fine pointe spécifique au site.</desc>
  <g stroke="var(--accent,#2f4a63)" stroke-width="1.25" stroke-linejoin="round">
    <polygon points="152.5,335 527.5,335 590,430 90,430" fill="var(--surface-2,#f1efea)"/>
    <polygon points="215,240 465,240 527.5,335 152.5,335" fill="var(--surface-2,#f1efea)"/>
    <polygon points="277.5,145 402.5,145 465,240 215,240" fill="var(--surface-2,#f1efea)"/>
    <polygon points="340,50 402.5,145 277.5,145" fill="var(--surface-2,#f1efea)"/>
  </g>
  <g fill="var(--text,#1a1917)" text-anchor="middle">
    <text x="340" y="392" font-size="15" font-weight="600">socle / base</text>
    <text x="340" y="410" font-size="11.5" fill="var(--muted,#6f6b64)">partagé · change rarement</text>
    <text x="340" y="291" font-size="15" font-weight="600">marque</text>
    <text x="340" y="307" font-size="11.5" fill="var(--muted,#6f6b64)">identité · règles</text>
    <text x="340" y="197" font-size="14" font-weight="600">marché</text>
    <text x="340" y="126" font-size="12.5" font-weight="600">site</text>
  </g>
  <g stroke="var(--muted,#6f6b64)" stroke-width="1">
    <line x1="595" y1="382" x2="628" y2="382"/>
    <line x1="404" y1="98" x2="628" y2="98"/>
  </g>
  <g fill="var(--muted,#6f6b64)" font-size="11.5" font-family="'IBM Plex Mono', monospace">
    <text x="634" y="386">l’essentiel du comportement</text>
    <text x="634" y="102">la part fine et spécifique</text>
  </g>
</svg>
